# Java CI/CD Pipeline with Maven
# Covers: Continuous Integration, Continuous Inspection (SonarCloud/SonarQube), Continuous Deployment
name: Java CI with Maven

on:
  push:
    branches: ["develop", "main", "feature/**"]
  pull_request:
    branches: ["develop", "main", "feature/**"]

jobs:
  build-and-inspect:
    name: "Build, Test & Sonar Inspection"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Resolve dependencies
        run: mvn -B dependency:go-offline --file pom.xml

      # ── Build, Test & Continuous Inspection ──

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/*.jar
          retention-days: 1

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
